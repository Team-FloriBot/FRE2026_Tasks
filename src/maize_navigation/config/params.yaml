maize_navigator:
  ros__parameters:
    pattern: "1L-1R-2L-3R"
    
    # Abstandsziel in der Reihe (ersetzt max_dist_in_row)
    max_dist_in_row: 0.375
    row_width: 0.75
    drive_out_dist: 1.0
    
    # Geschwindigkeiten
    vel_linear_drive: 0.5
    vel_linear_count: 0.5
    vel_linear_turn: 0.3
    
    perception:
      drive_in_row:
        x_min: 0.0
        x_max: 2.0
        y_min: 0.1
        y_max: 1.0
      turn_and_exit:
        x_min: -0.5
        x_max: 0.5
        y_min: 0.1
        y_max: 1.0
      counting_rows:
        x_min: -0.5
        x_max: 0.5
        y_min: 0.1
        y_max: 1.5
      turn_to_row:
        x_min: 0.0
        x_max: 1.5
        y_min: 0.1
        y_max: 1.0

    topics:
      pointcloud: "/merged_point_cloud"
      cmd_vel: "/cmd_vel"
      field_points: "/field_points"
